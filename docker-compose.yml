services:
  server:
    build:
      context: ./server
    environment:
      BIND_ADDR: 0.0.0.0:6677
      MEDIA_ROOT: /app/media
      CORS_ALLOW_ORIGIN: "*"
      RUST_LOG: "local_gallery_server=info,tower_http=warn"
    ports:
      - "6677:6677"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6677/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - type: bind
        source: ${MEDIA_ROOT:-./media}
        target: /app/media
        read_only: true

  web:
    build:
      context: ./web
    environment:
      INTERNAL_API_BASE_URL: http://server:6677
      # Optional override. If omitted, the frontend derives the public API host
      # from the browser request and uses port 6677.
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
    ports:
      - "9091:9091"
    depends_on:
      server:
        condition: service_healthy
