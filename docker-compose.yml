services:
  server:
    build:
      context: ./server
    environment:
      BIND_ADDR: 0.0.0.0:6677
      MEDIA_ROOT: /app/media
      CORS_ALLOW_ORIGIN: "*"
    ports:
      - "6677:6677"
    volumes:
      - type: bind
        source: ${MEDIA_ROOT:-./media}
        target: /app/media
        read_only: true

  web:
    build:
      context: ./web
    environment:
      INTERNAL_API_BASE_URL: http://server:6677
      # Optional override. If omitted, the frontend derives the public API host
      # from the browser request and uses port 6677.
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
    ports:
      - "9091:9091"
    depends_on:
      - server
